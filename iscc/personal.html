<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ISCC 2026 个人答题详情</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #0d1117;
      --bg-1: #0f141b;
      --bg-2: #161b22;
      --ink: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-2: #3fb950;
      --card: rgba(13, 17, 23, 0.72);
      --stroke: rgba(255, 255, 255, 0.08);
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--ink);
      background: var(--bg-0);
      min-height: 100vh;
    }

    header {
      padding: 28px 36px 10px;
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 26px;
      letter-spacing: 0.4px;
      margin: 0 0 6px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px 36px 6px;
      align-items: center;
    }

    .chip {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    label {
      color: var(--muted);
      font-size: 12px;
    }

    input[type="text"],
    input[type="number"] {
      background: var(--bg-0);
      color: var(--ink);
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: "IBM Plex Sans", sans-serif;
    }

    input[type="text"] { width: 200px; }
    input[type="number"] { width: 90px; }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.25);
    }

    .chip-btn {
      background: #21262d;
      color: var(--ink);
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .chip-btn:hover {
      border-color: rgba(88, 166, 255, 0.6);
      background: rgba(88, 166, 255, 0.12);
    }

    .link-btn {
      color: var(--ink);
      text-decoration: none;
      border: 1px solid #30363d;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      background: #161b22;
    }

    .layout {
      padding: 8px 36px 36px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      color: var(--muted);
      margin: 0;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat {
      padding: 14px;
      border-radius: 12px;
      background: rgba(15, 20, 27, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stat h3 {
      margin: 0 0 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      color: var(--muted);
    }

    .stat p {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .full { grid-column: span 12; }
    .half { grid-column: span 6; }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border-radius: 12px;
      border: 1px solid #30363d;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #30363d;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: #161b22;
      position: sticky;
      top: 0;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    .small-user {
      color: #ffb703;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .small-badge {
      border: 1px solid rgba(255, 183, 3, 0.6);
      color: #ffb703;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      text-transform: none;
    }

    .expand-btn {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--stroke);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .empty {
      color: var(--muted);
      padding: 16px 0;
    }

    @media (max-width: 1100px) {
      .half, .full { grid-column: span 12; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 640px) {
      header, .toolbar, .layout { padding-left: 16px; padding-right: 16px; }
      .stat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>个人答题详情</h1>
    <div class="sub">展示个人每题答题时间、排名与同校相近用户</div>
  </header>

  <div class="toolbar">
    <div class="chip">
      <label for="userSearch">用户名</label>
      <input id="userSearch" type="text" list="userOptions" placeholder="输入用户名" />
      <button class="chip-btn" id="goUser">查询</button>
    </div>
    <div class="chip">
      <label for="threshold">相近阈值(分钟)</label>
      <input id="threshold" type="number" min="1" value="5" />
    </div>
    <a class="link-btn" href="analysis_report.html">返回主页</a>
  </div>

  <div class="layout">
    <div class="card full">
      <div class="card-header">
        <p class="card-title">个人信息</p>
      </div>
      <div class="stat-grid" id="userSummary"></div>
    </div>

    <div class="card full">
      <div class="card-header">
        <p class="card-title">答题明细</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>题目</th>
              <th>类型</th>
              <th>答题时间</th>
              <th>排名</th>
              <th>同校相近用户</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>
      </div>
      <div class="note">相近用户基于同校且时间差不超过阈值</div>
    </div>

    <div class="card half">
      <div class="card-header">
        <p class="card-title"><span id="summaryUserLabel">当前查询用户</span>的同校最相近用户</p>
        <button class="expand-btn" id="expandSummary">扩大</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>用户</th>
              <th>相近次数</th>
              <th>平均差(分钟)</th>
            </tr>
          </thead>
          <tbody id="summaryTable"></tbody>
        </table>
      </div>
      <div class="note">默认显示前 5 人，展开可查看全部</div>
    </div>
  </div>

  <datalist id="userOptions"></datalist>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userSearchInput = document.getElementById("userSearch");
    const goUserButton = document.getElementById("goUser");
    const thresholdInput = document.getElementById("threshold");
    const userOptions = document.getElementById("userOptions");
    const userSummary = document.getElementById("userSummary");
    const userTable = document.getElementById("userTable");
    const summaryTable = document.getElementById("summaryTable");
    const expandSummary = document.getElementById("expandSummary");
    const summaryUserLabel = document.getElementById("summaryUserLabel");
    let summaryExpanded = false;
    const SMALL_ACCOUNT_MAX_SOLVES = 5;

    const state = {
      users: [],
      schools: [],
      userSchoolMap: {},
      raw: { arena: {}, challenge: {} },
      meta: { arena: {}, challenge: {} },
      userSolveCounts: {},
    };

    function fetchJson(path) {
      return fetch(path).then((res) => {
        if (!res.ok) throw new Error(`Load failed: ${path}`);
        return res.json();
      });
    }

    function updateDatalist(datalist, options) {
      datalist.innerHTML = "";
      options.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        datalist.appendChild(option);
      });
    }

    function getUserOptions(filterText) {
      const query = (filterText || "").trim().toLowerCase();
      if (!query) return state.users;
      return state.users.filter((name) => name.toLowerCase().startsWith(query));
    }

    function resolveUser(input) {
      const value = (input || "").trim();
      if (!value) return "";
      const exact = state.users.find((u) => u === value);
      if (exact) return exact;
      const lower = value.toLowerCase();
      return state.users.find((u) => u.toLowerCase().startsWith(lower)) || "";
    }

    function buildSolveIndex(raw) {
      const index = {};
      Object.keys(raw || {}).forEach((category) => {
        Object.keys(raw[category] || {}).forEach((challengeId) => {
          const key = `${category}:${challengeId}`;
          index[key] = (raw[category][challengeId].solves || []).slice();
        });
      });
      return index;
    }

    function buildChallengeMeta(raw) {
      const meta = {};
      Object.keys(raw || {}).forEach((category) => {
        Object.keys(raw[category] || {}).forEach((challengeId) => {
          const key = `${category}:${challengeId}`;
          meta[key] = {
            category,
            challengeId,
            name: raw[category][challengeId].name || challengeId,
          };
        });
      });
      return meta;
    }

    function buildUserSolveCounts(index) {
      const counts = {};
      Object.values(index || {}).forEach((solves) => {
        (solves || []).forEach((solve) => {
          if (!solve.name) return;
          counts[solve.name] = (counts[solve.name] || 0) + 1;
        });
      });
      return counts;
    }

    function formatTime(value) {
      if (!value) return "-";
      if (typeof value === "string") return value;
      if (value instanceof Date && !Number.isNaN(value.getTime())) {
        return value.toISOString().replace("T", " ").slice(0, 19);
      }
      return String(value);
    }

    function buildUserStats(username, thresholdMinutes) {
      const school = state.userSchoolMap[username];
      const summary = new Map();
      const rows = [];

      ["arena", "challenge"].forEach((dataset) => {
        const meta = state.meta[dataset];
        const index = state.raw[dataset];
        Object.keys(meta).forEach((key) => {
          const solves = (index[key] || [])
            .map((solve) => ({
              name: solve.name,
              time: new Date(solve.date.replace(" ", "T")),
              timeText: solve.date,
            }))
            .filter((solve) => !Number.isNaN(solve.time.getTime()))
            .sort((a, b) => a.time - b.time);

          const userIndex = solves.findIndex((solve) => solve.name === username);
          if (userIndex === -1) return;

          const userSolve = solves[userIndex];
          const closeUsers = new Map();
          const thresholdMs = thresholdMinutes * 60 * 1000;

          for (let i = userIndex - 1; i >= 0; i -= 1) {
            const diff = userSolve.time - solves[i].time;
            if (diff > thresholdMs) break;
            if (state.userSchoolMap[solves[i].name] === school && solves[i].name !== username) {
              closeUsers.set(solves[i].name, diff);
            }
          }
          for (let i = userIndex + 1; i < solves.length; i += 1) {
            const diff = solves[i].time - userSolve.time;
            if (diff > thresholdMs) break;
            if (state.userSchoolMap[solves[i].name] === school && solves[i].name !== username) {
              closeUsers.set(solves[i].name, diff);
            }
          }

          let nearestName = "";
          let nearestDiff = null;
          closeUsers.forEach((diff, name) => {
            if (nearestDiff == null || diff < nearestDiff) {
              nearestDiff = diff;
              nearestName = name;
            }
          });
          if (nearestName) {
            if (!summary.has(nearestName)) {
              summary.set(nearestName, { name: nearestName, count: 0, totalDiff: 0 });
            }
            const item = summary.get(nearestName);
            item.count += 1;
            item.totalDiff += nearestDiff;
          }

          rows.push({
            challenge: meta[key].name,
            dataset,
            time: userSolve.time,
            timeText: userSolve.timeText,
            rank: userIndex + 1,
            close: Array.from(closeUsers.entries())
              .sort((a, b) => a[1] - b[1])
              .map(([name]) => name),
          });
        });
      });

      const summaryRows = Array.from(summary.values())
        .map((item) => ({
          name: item.name,
          count: item.count,
          avgMinutes: (item.totalDiff / item.count / 60000).toFixed(1),
        }))
        .sort((a, b) => (b.count - a.count) || (parseFloat(a.avgMinutes) - parseFloat(b.avgMinutes)));

      rows.sort((a, b) => a.time - b.time);
      return { rows, summaryRows, school };
    }

    function renderUser(username) {
      if (!username) {
        userSummary.innerHTML = "<div class=\"empty\">未选择用户</div>";
        userTable.innerHTML = "";
        summaryTable.innerHTML = "";
        if (summaryUserLabel) summaryUserLabel.textContent = "当前查询用户";
        return;
      }

      if (summaryUserLabel) summaryUserLabel.textContent = username;

      const thresholdMinutes = parseInt(thresholdInput.value, 10) || 5;
      const { rows, summaryRows, school } = buildUserStats(username, thresholdMinutes);
      const solveCount = state.userSolveCounts[username] || 0;
      const isSmall = solveCount <= SMALL_ACCOUNT_MAX_SOLVES;
      const displayName = isSmall
        ? `<span class="small-user">${username}<span class="small-badge">小号</span></span>`
        : username;

      const stats = [
        { label: "用户名", value: displayName },
        { label: "学校", value: school || "-" },
        { label: "答题数", value: rows.length },
        { label: "阈值(分钟)", value: thresholdMinutes },
      ];
      userSummary.innerHTML = "";
      stats.forEach((stat) => {
        const div = document.createElement("div");
        div.className = "stat";
        div.innerHTML = `<h3>${stat.label}</h3><p>${stat.value}</p>`;
        userSummary.appendChild(div);
      });

      if (rows.length === 0) {
        userTable.innerHTML = "<tr><td colspan=\"5\" class=\"empty\">未找到答题记录</td></tr>";
      } else {
        userTable.innerHTML = rows.map((row) => {
          const close = row.close.length ? row.close.join(", ") : "-";
          const typeLabel = row.dataset === "arena" ? "擂台" : "练武";
          return `
            <tr>
              <td>${row.challenge}</td>
              <td>${typeLabel}</td>
              <td>${formatTime(row.timeText)}</td>
              <td>${row.rank}</td>
              <td>${close}</td>
            </tr>
          `;
        }).join("");
      }

      const displayRows = summaryExpanded ? summaryRows : summaryRows.slice(0, 5);
      if (displayRows.length === 0) {
        summaryTable.innerHTML = "<tr><td colspan=\"3\" class=\"empty\">暂无相近用户</td></tr>";
      } else {
        summaryTable.innerHTML = displayRows.map((row) => `
          <tr>
            <td>${row.name}</td>
            <td>${row.count}</td>
            <td>${row.avgMinutes}</td>
          </tr>
        `).join("");
      }
    }

    Promise.all([
      fetchJson("data/arena.json").catch(() => ({})),
      fetchJson("data/challenge.json").catch(() => ({})),
      fetchJson("data/iscc2026_users.json").catch(() => ([])),
    ])
      .then(([rawArena, rawChallenge, users]) => {
        state.raw.arena = buildSolveIndex(rawArena);
        state.raw.challenge = buildSolveIndex(rawChallenge);
        state.meta.arena = buildChallengeMeta(rawArena);
        state.meta.challenge = buildChallengeMeta(rawChallenge);
        state.userSolveCounts = buildUserSolveCounts(state.raw.arena);
        Object.entries(buildUserSolveCounts(state.raw.challenge)).forEach(([name, count]) => {
          state.userSolveCounts[name] = (state.userSolveCounts[name] || 0) + count;
        });
        state.userSchoolMap = (users || []).reduce((acc, row) => {
          acc[row.username] = row.school;
          return acc;
        }, {});
        state.users = (users || []).map((row) => row.username).filter(Boolean);
        updateDatalist(userOptions, state.users);

        const queryUser = params.get("user") || "";
        const resolved = resolveUser(queryUser) || state.users[0] || "";
        userSearchInput.value = resolved;
        renderUser(resolved);
      })
      .catch((err) => {
        document.body.innerHTML = `<pre style=\"color:#fff;padding:24px\">${err.message}</pre>`;
      });

    userSearchInput.addEventListener("input", (event) => {
      updateDatalist(userOptions, getUserOptions(event.target.value));
    });

    goUserButton.addEventListener("click", () => {
      const resolved = resolveUser(userSearchInput.value);
      if (!resolved) {
        alert("未找到对应用户，请从提示中选择");
        return;
      }
      params.set("user", resolved);
      history.replaceState({}, "", `${location.pathname}?${params.toString()}`);
      renderUser(resolved);
    });

    thresholdInput.addEventListener("input", () => {
      renderUser(resolveUser(userSearchInput.value));
    });

    expandSummary.addEventListener("click", () => {
      summaryExpanded = !summaryExpanded;
      expandSummary.textContent = summaryExpanded ? "收起" : "扩大";
      renderUser(resolveUser(userSearchInput.value));
    });
  </script>
</body>
</html>
